<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page - Visual Testing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .emoji {
            font-size: 64px;
            margin-bottom: 24px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 18px;
            color: #475569;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .description {
            font-size: 16px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .logout-button {
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .logout-button:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🎉</div>
        <h1 class="title">Welcome!</h1>
        <p class="subtitle">
            You have successfully logged in to the Visual Testing App
        </p>
        <p class="description">
            This is the home screen that appears after successful authentication.
            You can use this page for visual regression testing with Playwright.
        </p>
        
        <button 
            class="logout-button" 
            id="logoutButton"
            data-testid="logout-button"
            onclick="window.location.href='/'"
        >
            Logout
        </button>
    </div>
</body>
</html>
