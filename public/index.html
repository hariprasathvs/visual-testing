<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - Visual Testing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
        }

        .form {
            width: 100%;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group.username-group {
            text-align: center;
        }

        .input-group.username-group .input {
            text-align: center;
        }

        .label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            color: #1f2937;
            background-color: white;
        }

        .input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .login-button {
            width: 100%;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-button:hover {
            background-color: #2563eb;
        }

        .login-button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .error-message {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            color: #dc2626;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .demo-credentials {
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
        }

        .demo-title {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .demo-text {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 2px;
        }

        .loading {
            display: none;
        }

        .loading.show {
            display: inline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔐</div>
            <h1 class="title">Welcome Back</h1>
            <p class="subtitle">Sign in to your account</p>
        </div>

        <form class="form" id="loginForm">
            <div class="error-message" id="errorMessage"></div>

            <div class="input-group username-group">
                <label class="label" for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    class="input" 
                    placeholder="Enter your username"
                    data-testid="username-input"
                    required
                >
            </div>

            <div class="input-group">
                <label class="label" for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="input" 
                    placeholder="Enter your password"
                    data-testid="password-input"
                    required
                >
            </div>

            <button 
                type="submit" 
                class="login-button" 
                id="loginButton"
                data-testid="login-button"
            >
                <span class="loading" id="loadingText">Signing In...</span>
                <span id="buttonText">Sign In</span>
            </button>
        </form>

        <div class="demo-credentials">
            <div class="demo-title">Demo Credentials:</div>
            <div class="demo-text">Username: admin</div>
            <div class="demo-text">Password: password</div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('loginButton');
        const buttonText = document.getElementById('buttonText');
        const loadingText = document.getElementById('loadingText');
        const errorMessage = document.getElementById('errorMessage');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        function setLoading(loading) {
            if (loading) {
                loginButton.disabled = true;
                buttonText.style.display = 'none';
                loadingText.classList.add('show');
            } else {
                loginButton.disabled = false;
                buttonText.style.display = 'inline';
                loadingText.classList.remove('show');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            hideError();
            setLoading(true);

            // Simulate API call
            setTimeout(() => {
                setLoading(false);
                
                if (username === 'admin' && password === 'password') {
                    // Success - redirect to home page
                    window.location.href = '/home.html';
                } else {
                    showError('Invalid username or password');
                }
            }, 1000);
        });
    </script>
</body>
</html>
